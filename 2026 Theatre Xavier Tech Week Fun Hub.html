<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Xavier Tech Week Fun Hub</title>
    <link rel="icon" href="theatre-emoji.ico" type="image/x-icon">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #ff69b4, #1e90ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        h1, h2 {
            color: white;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: 10px 0;
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-weight: bold;
        }

        button:hover { transform: scale(1.05); }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            will-change: transform, opacity;
        }

        #countdown {
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .card.selected {
            box-shadow: 0 0 25px 5px #ff69b4;
            transform: scale(1.02);
            transition: all 0.3s ease;
        }

        #funFact {
            transition: opacity 0.3s ease; transform: 0.3s ease;
        }

        #funFactCard.flipped {
            transform: rotateY(180deg);
            transition: transform 0.6s ease;
        }

        @media (max-width: 400px) {
            h1, h2 {
                font-size: 1.4em;
            }
            .card {
                padding: 12px;
            }
            button {
                font-size: 14px;
                padding: 10px;
            }
            #countdown {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<h1>Theatre Xavier Tech Week Fun Hub</h1>

<!-- This or That Game -->
<div class="card">
    <h2>This or That?</h2>
    <button id="leftBtn">Spotlight 🎨</button>
    <button id="rightBtn">Props 🔧</button>
    <p id="roundCounter">Round 1 of 3</p>
</div>

<!-- Fun Fact -->
<div class="card" id="funFactCard">
    <h2>Fun Fact 🎭</h2>
    <p id="funFact">Click below for a fun theatre fact!</p>
    <button id="funFactBtn">New Fact!</button>
</div>

<!-- Countdown -->
<div class="card">
    <h2>Countdown to Curtain Up ⏰</h2>
    <p id="countdown">Loading...</p>
    <p id="nextShow" style="font-size: 12px; color:#333; margin-top:8px;"></p>
</div>

<script>
    // --- THIS OR THAT GAME ---
    const choices = [
        ["Spotlight 🎨", "Props 🔧"],
        ["Stage Left 🎭", "Stage Right 🎭"],
        ["Comedy 😂", "Tragedy 😢"],
        ["Silent Rehearsal 🤫", "Music On 🎶"]
    ];

    const MAX_ROUNDS = choices.length;
    let round = 0;

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const roundCounter = document.getElementById("roundCounter");

    leftBtn.onclick = () => { 
        leftBtn.disabled = true;
        setTimeout(() => leftBtn.disabled = false, 1000);
        celebrateButton(leftBtn)
        nextChoice('left'); 
    };
    rightBtn.onclick = () => { 
        rightBtn.disabled = true;
        setTimeout(() => rightBtn.disabled = false, 1000);
        celebrateButton(rightBtn)
        nextChoice('right'); 
    };

    function createConfetti() {
        for (let i = 0; i < 50; i++) {
            const dot = document.createElement("div");
            dot.classList.add("confetti");
            dot.style.backgroundColor = `hsl(${Math.random() * 360}, 50%)`;
            dot.style.left = `${Math.random() * window.innerWidth}px`;
            dot.style.top = `${Math.random() * window.innerHeight}px`;
            document.body.appendChild(dot);
            const xMove = (Math.random() - 0.5) * 100;
            const yMove = (Math.random() - 0.5) * 100 + 50;
            dot.animate([
                {transform : `translate(0, 0) rotate(0deg)`},
                {transform : `translate(${xMove}px, ${yMove}px) rotate(${Math.random() * 360}deg)`, opacity: 0}
            ], { duration: 1000 + Math.random()*500, easing: 'ease-in-out' });
            setTimeout(() => dot.remove(), 1500);
        }
    }

    function celebrateButton(btn) {
        btn.animate([{transform: 'scale(1)'},{transform: 'scale(1.2)'},{transform: 'scale(1)'}], { duration: 300, easing: 'ease-out' });
        for (let i = 0; i < 20; i++) {
            const dot = document.createElement("div");
            dot.className = "confetti";
            dot.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            const rect = btn.getBoundingClientRect();
            dot.style.left = `${rect.left + rect.width/2}px`;
            dot.style.top = `${rect.top + rect.height/2}px`;
            document.body.appendChild(dot);
            const xMove = (Math.random() - 0.5) * 100;
            const yMove = (Math.random() - 0.5) * 100 - 50;
            dot.animate([{transform: `translate(0, 0) rotate(0deg)`},{transform: `translate(${xMove}px, ${yMove}px) rotate(${Math.random() * 360}deg)`, opacity: 0}], {duration: 800 + Math.random() * 400, easing: 'ease-out'});
            setTimeout(() => dot.remove(), 1200);
        }
    }

    function nextChoice(side) {
        createConfetti();
        round++;
        if (round >= MAX_ROUNDS) {
            showVictory();
            round = 0;
            return;
        }
        leftBtn.textContent = choices[round % MAX_ROUNDS][0];
        rightBtn.textContent = choices[round % MAX_ROUNDS][1];
        roundCounter.textContent = `Round ${round + 1} of ${MAX_ROUNDS}`;
    }

    function showVictory() {
        const card = document.querySelector(".card");
        card.innerHTML = `<div><h2>🎉 Tech Week Fun Complete! 🎉</h2><p>Thanks for playing - want to try again?</p><button id="replayBtn">Play Again</button></div>`;
        createConfetti(); createConfetti();
        document.getElementById('replayBtn').onclick = () => location.reload();
    }

    // --- FUN FACT GENERATOR ---
    const funFacts = [
        "A single followspot operator can control light intensity, color, and beam size all while moving with the performer.",
        "The term 'tech week' comes from the old days when each rehearsal had to test every technical element—lights, sound, props—before opening night.",
        "Some stage floors are built with 'sprung' boards to protect actors’ knees and joints during dance-heavy shows.",
        "The mask of comedy and tragedy comes from Ancient Greek theatre, and actors once had to project their voices through them!",
        "Stagehands often wear black to stay invisible to the audience while moving props or scenery.",
        "Backstage cues are often called silently with hand signals, not verbal commands, during shows.",
        "Old theatre curtains are often fireproofed with chemicals to meet safety codes.",
        "Props can have multiple duplicates, so if one breaks mid-show, a backup is ready.",
        "Every stage light has a color gel, and swapping them changes the mood of the scene instantly.",
        "Spotlights were once manually cranked, and modern automated lights still mimic the classic movements for effect."
    ];

    const showDates = [
        new Date("March, 20, 2026 19:30:00"),
        new Date("March, 21, 2026 19:30:00"),
        new Date("March 22, 2026 14:00:00"),
        new Date("March 26, 2026 19:30:00"),
        new Date("March 27, 2026 19:30:00"),
        new Date("March 28, 2026 19:30:00")
    ];

    function getNextShow() {
        const now = new Date();
        for (let date of showDates) if (date > now) return date;
        return null;
    }

    function formatDateShort(d) {
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function updateCountdown() {
        const nextShow = getNextShow();
        const countdownEl = document.getElementById("countdown");
        const nextShowEl = document.getElementById("nextShow");
        if (!nextShow) {
            countdownEl.textContent = "All shows have ended! 🎉";
            return;
        }
        nextShowEl.textContent = `Next show: ${formatDateShort(nextShow)}`;
        const diff = nextShow - new Date();
        if (diff <= 0) {
            countdownEl.textContent = "Curtain Up! 🎉";
            return;
        }
        const totalSeconds = Math.floor(diff / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        countdownEl.textContent = `${hours}h ${minutes}m ${seconds}s until next show`;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    let factDeck = [...funFacts].sort(() => Math.random() - 0.5);
    const funFactBtn = document.getElementById("funFactBtn");
    const funFactText = document.getElementById("funFact");
    funFactBtn.onclick = () => {
        const card = document.getElementById("funFactCard");
        card.classList.add("flipped");
        funFactText.style.opacity = 0;
        setTimeout(() => {
            if (factDeck.length === 0) factDeck = [...funFacts].sort(() => Math.random() - 0.5);
            funFactText.textContent = factDeck.pop();
            funFactText.style.opacity = 1;
            card.classList.remove("flipped");
        }, 600);
    }
</script>
</body>
</html>
